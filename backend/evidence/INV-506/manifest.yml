ticket: INV-506
title: "Folio & Invoice Support, Framework"
state: Ready for Testing
ticket_type: folio
booking_dependent: true

pr_context:
  diff_found: false
  anchor: scope-and-repro
  note: "Headless run — VCS MCP unavailable. TCs anchored to ticket description and known product defects (folio line items empty, invoice charge shows placeholder amount, balance not reconciling)."

acceptance_criteria:
  - id: AC-1
    text: "System supports displaying the Folio for a booking — folio page renders without error"
    source: description
  - id: AC-2
    text: "Folio line item rows are populated (not empty)"
    source: derived — known open defect in product context
  - id: AC-3
    text: "System supports displaying the Invoice for a booking — invoice page renders without error"
    source: description
  - id: AC-4
    text: "Invoice Hotel Room charge displays a correct dollar amount (not a ticket ID like INV-506.00)"
    source: derived — known open defect in product context
  - id: AC-5
    text: "Invoice running balance reconciles: Subtotal + taxes = Total; Total - Deposits = Balance Due"
    source: derived — known open defect in product context
  - id: AC-6
    text: "Print Folio button invokes window.print() (not a custom dialog)"
    source: product spec
  - id: AC-7
    text: "Print Invoice button invokes window.print() (not a custom dialog)"
    source: product spec
  - id: AC-8
    text: "GET /so/folio?booking_id returns valid payload with line items present"
    source: description — API support required
  - id: AC-9
    text: "GET /so/invoice?booking_id returns valid payload with reconciling totals"
    source: description — API support required

test_cases:
  - id: TC-0506-001
    title: "Folio page renders via Reservation Detail → Print Folio link"
    type: functional
    priority: P0
    ac_refs: [AC-1]
    evidence_required: [screenshot, network]
    steps:
      - Navigate to /reservation/BK_J755DICT
      - Locate Print Folio button or link
      - Navigate to /reservation/BK_J755DICT/folio
      - Assert page renders (no error state, no blank page)
    notes: "booking_dependent=true; seed BK_J755DICT (booking_id=8). Anchored to ticket description: 'display and print the folio for the booking'"
    annotations_hint: "Arrow pointing at folio header and hotel name; callout on any error/empty state"
    tags: ["@INV-506", "@folio", "@render"]

  - id: TC-0506-002
    title: "Folio line item rows are populated (not empty)"
    type: functional
    priority: P0
    ac_refs: [AC-2]
    evidence_required: [screenshot, network]
    steps:
      - Navigate to /reservation/BK_J755DICT/folio
      - Assert at least one line item row is visible and contains text
      - Check that room charges, taxes appear in the table
    notes: "Known defect: 'Folio render — line item rows currently empty (open issue)'. This TC verifies the fix. Anchored to AC-2 derived from product context."
    annotations_hint: "Highlight the line items table; box around each row; red callout if rows are empty"
    tags: ["@INV-506", "@folio", "@line-items"]

  - id: TC-0506-003
    title: "Invoice page renders via Reservation Detail → Print Invoice link"
    type: functional
    priority: P0
    ac_refs: [AC-3]
    evidence_required: [screenshot, network]
    steps:
      - Navigate to /reservation/BK_J755DICT
      - Locate Print Invoice button or link
      - Navigate to /reservation/BK_J755DICT/invoice
      - Assert page renders (no error state, no blank page)
    notes: "booking_dependent=true; seed BK_J755DICT (booking_id=8). Anchored to ticket description: 'display and print the folio for the booking'"
    annotations_hint: "Arrow pointing at invoice header, invoice number; callout on any error/empty state"
    tags: ["@INV-506", "@invoice", "@render"]

  - id: TC-0506-004
    title: "Invoice Hotel Room charge is a dollar amount, not a ticket ID placeholder"
    type: functional
    priority: P0
    ac_refs: [AC-4]
    evidence_required: [screenshot]
    steps:
      - Navigate to /reservation/BK_J755DICT/invoice
      - Locate the Hotel Room charge line item
      - Assert the amount is a valid dollar value (e.g. $123.45) and NOT a ticket ID (e.g. INV-506.00)
    notes: "Known defect: 'Invoice render — Hotel Room charge shows INV-506.00'. This TC verifies the fix."
    annotations_hint: "Box around the Hotel Room charge amount; red callout if it shows INV-506.00 or similar"
    tags: ["@INV-506", "@invoice", "@charge-amount"]

  - id: TC-0506-005
    title: "Invoice running balance reconciles: Subtotal + taxes = Total, Total - Deposits = Balance Due"
    type: functional
    priority: P0
    ac_refs: [AC-5]
    evidence_required: [screenshot]
    steps:
      - Navigate to /reservation/BK_J755DICT/invoice
      - Read Subtotal, PST Room 8%, PST Non-Room 7%, GST 5%, MRDT 3%, Total, Deposits, Balance Due
      - Assert Subtotal + all taxes = Total (within $0.01 rounding)
      - Assert Total - Deposits = Balance Due (within $0.01)
    notes: "Known defect: 'running Balance never reconciling to Total'. Verifies math fix."
    annotations_hint: "Annotate totals section with expected math; red callout if numbers don't reconcile"
    tags: ["@INV-506", "@invoice", "@totals", "@math"]

  - id: TC-0506-006
    title: "Print Folio button invokes window.print()"
    type: functional
    priority: P1
    ac_refs: [AC-6]
    evidence_required: [screenshot, manual-note]
    steps:
      - Navigate to /reservation/BK_J755DICT/folio
      - Locate Print button
      - Use browser_evaluate to monkey-patch window.print and detect invocation
      - Click Print button
      - Assert window.print was called (not a custom dialog)
    notes: "Product spec: 'Print buttons must invoke window.print() not custom dialog'"
    tags: ["@INV-506", "@folio", "@print"]

  - id: TC-0506-007
    title: "Print Invoice button invokes window.print()"
    type: functional
    priority: P1
    ac_refs: [AC-7]
    evidence_required: [screenshot, manual-note]
    steps:
      - Navigate to /reservation/BK_J755DICT/invoice
      - Locate Print button
      - Use browser_evaluate to monkey-patch window.print and detect invocation
      - Click Print button
      - Assert window.print was called (not a custom dialog)
    notes: "Product spec: 'Print buttons must invoke window.print() not custom dialog'"
    tags: ["@INV-506", "@invoice", "@print"]

  - id: TC-0506-008
    title: "API: GET /so/folio?booking_id=8 returns valid payload with line items"
    type: api
    priority: P0
    ac_refs: [AC-8]
    evidence_required: [network]
    steps:
      - Call GET /api/v1/so/folio?booking_id=8 in-browser using scribeApi helper
      - Assert HTTP 200
      - Assert response contains line_items array with at least one entry
      - Assert each line item has description, amount, quantity fields
    notes: "booking_id=8 from seed_booking. Anchored to ticket description: 'The get Folio API will be provided by the payment service'"
    tags: ["@INV-506", "@api", "@folio"]

  - id: TC-0506-009
    title: "API: GET /so/invoice?booking_id=8 returns valid payload with reconciling totals"
    type: api
    priority: P0
    ac_refs: [AC-9]
    evidence_required: [network]
    steps:
      - Call GET /api/v1/so/invoice?booking_id=8 in-browser using scribeApi helper
      - Assert HTTP 200
      - Assert response contains subtotal, total, balance_due, line_items
      - Assert math: subtotal + taxes ≈ total (within $0.01)
    notes: "invoice_total_due from seed=12685. Verifies API contract matches invoice display."
    tags: ["@INV-506", "@api", "@invoice"]

