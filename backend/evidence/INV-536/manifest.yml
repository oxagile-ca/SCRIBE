ticket: INV-536
title: "[SPIKE][Create, Review] - Timeout and Partial Booking State Handling"
state: Ready for Testing
created: "2026-06-29T00:00:00Z"
assignee: Becca Manning
labels: [Front-End, Spike]
milestone: Booking Idempotency - Timeout Recovery

scope_summary: >
  SPIKE: Investigate and document the approach for handling API timeout and
  partial booking state during the Create Reservation flow (SD4.1.3).
  The spike found that both recovery paths (A: redirect to valid booking,
  B: allow safe retry) are blocked under current BE constraints without
  an idempotency key. The approach chosen: add idempotency key to DB (INV-552)
  and implement FE timeout recovery using that key (INV-558).

pr_context:
  diff_found: false
  note: >
    This is a SPIKE ticket — no code implementation PR. Spike findings are
    documented in ticket comments. TCs anchored to spike ACs and documented
    behavior. Implementation covered by INV-558 (already tested).

acceptance_criteria:
  - id: AC-1
    text: >
      A timeout during booking creation does not silently leave the user
      in a broken state.
    source: description
  - id: AC-2
    text: >
      The user only leaves the create flow with a valid booking.
    source: description
  - id: AC-3
    text: >
      Chosen approach is documented on this ticket before implementation begins.
    source: description

