    source: INV-596 description

test_cases:
  - id: TC-0592-001
    title: "POST /booking/item triggers SO resync — booking item appears as SO line item"
    ac: [AC-1]
    type: api
    priority: P0
    evidence_required: [screenshot, network, api]
    spec: "TBD"
    steps:
      - "Authenticate in browser session"
      - "Find a CONFIRMED booking with existing SO via GET /so/transactions"
      - "Record current SO line item count"
      - "Call POST /booking/item for that booking (in-page via scribeApi)"
      - "Verify 200 OK response"
      - "Call GET /so/transactions?booking_id=X to verify line item was created/updated for added booking item"
    tags: ["@INV-592", "@INV-593", "@api", "@P0"]
    notes: "PR163: services/booking/BookingService.java — Add Booking Item handler; SN16 forces resync loop. Verify resync fires by checking SO line items after add."

  - id: TC-0592-002
    title: "POST /so/lineitem validates CURR_BI.booking_id not null (INV-594 fix)"
    ac: [AC-2]
    type: api
    priority: P1
    evidence_required: [api]
    spec: "TBD"
    steps:
      - "Authenticate in browser session"
      - "Find a booking item where booking_id would be null (orphaned BI) or simulate via direct API call with invalid booking item"
      - "Call POST /so/lineitem with that booking item"
      - "Verify INVALID_PARAMETERS response (not a generic null-check error)"
    tags: ["@INV-592", "@INV-594", "@api", "@P1"]
    notes: "PR164: SO line item service SN25 — checks CURR_BI.booking_id = null instead of CURR_BI = null. This is a validation correction, test must confirm correct error path triggers."

  - id: TC-0592-003
    title: "PUT /so/lineitem/resync creates new SO line item for booking item with no existing line item"
    ac: [AC-3, AC-4]
    type: api
    priority: P0
    evidence_required: [screenshot, api]
    spec: "TBD"
    steps:
      - "Find a CONFIRMED booking with SO but where a booking item may not yet have a line item"
      - "Call GET /so/transactions?booking_id=X to see current SO state"
      - "Call PUT /so/lineitem/resync with that booking item ID in-page"
      - "Verify 200 OK and that response contains the updated sales order"
      - "Verify the response SO includes a line item for the booking item (new line item created)"
    tags: ["@INV-592", "@INV-595", "@api", "@P0"]
    notes: "PR164: ResyncSOLineItem SN33-37 — new alt block when OLD_SO_LI_ARR is empty/null. Also SN11 corrected to query sales_order_line_item_tbl."

  - id: TC-0592-004
    title: "PUT /so/resync handles booking with no existing Sales Order (creates new SO)"
    ac: [AC-5]
    type: api
    priority: P1
    evidence_required: [api]
    spec: "TBD"
    steps:
      - "Find or identify a booking that has no SO attached (or verify the creation flow)"
      - "Call GET /so/transactions?booking_id=X — verify no SO exists"
      - "Call PUT /so/resync with that booking_id in-page"
      - "Verify 200 OK and that a new SO is returned with status DRAFT"
      - "Call GET /so/transactions again to confirm SO persisted"
    tags: ["@INV-592", "@INV-596", "@api", "@P1"]
    notes: "PR166: ResyncSO SN17-23 — handles null CACHE entry by creating new SO. New SO status must be DRAFT."

  - id: TC-0592-005
    title: "GET /so/transactions returns populated line items for CONFIRMED booking after SO integration"
    ac: [AC-1, AC-3]
    type: api
    priority: P0
    evidence_required: [screenshot, api]
    spec: "TBD"
    steps:
      - "Navigate to dashboard in browser"
      - "Find a CONFIRMED booking that has been through the Add Booking Item flow"
      - "Call GET /so/transactions?booking_id=X in-page"
      - "Assert: response contains line_items array with at least one entry"
      - "Assert: each line_item has unit_price, unit_quantity, name, status fields"
      - "Screenshot the reservation details page (Payments tab if available)"
    tags: ["@INV-592", "@INV-593", "@INV-595", "@api", "@P0"]
    notes: "End-to-end validation — confirms the full SO integration chain is functional for a real booking. Ties together INV-593 and INV-595."

