    priority: P0
    evidence_required: [network]
    notes: "Capture browser_network_requests; filter for non-2xx status codes"

  - id: TC-UV-3
    title: "Broken asset scan — all images and CSS backgrounds return 200"
    type: automated
    priority: P1
    evidence_required: [screenshot]
    notes: "Walk DOM for img src, source srcset, background-image URLs; HEAD-fetch each"

