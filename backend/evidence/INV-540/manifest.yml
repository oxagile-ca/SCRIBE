    tags: ["@INV-540", "@calculation", "@date-math"]
    notes: "Verifies the exclusive-end-date calculation rule: Sept 1 to Sept 4 = 3 nights not 4. Anchored to AC-2."
    annotations_hint: "Annotate with the date math table showing start, end, expected nights, actual quantity."

