  - id: TC-0631-010
    title: "Search Bookings - Overlap Logic (Insiders, Outsiders, Left-Siders, Right-Siders)"
    type: automated
    priority: P1
    evidence_required: [screenshot, network]
    spec: "tests/e2e/search.spec.ts"
