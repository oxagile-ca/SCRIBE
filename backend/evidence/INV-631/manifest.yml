acceptance_criteria:
  - id: AC-1
    text: "Create Reservation stepper completes with valid data: find rooms by date range, select room, enter guest info, add notes, confirm."
    source: description
  - id: AC-2
    text: "Check In action transitions booking from CONFIRMED to CHECKIN and reflects on dashboard."
    source: description
  - id: AC-3
    text: "Check Out action transitions booking from CHECKIN to CHECKED_OUT and finalizes stay."
    source: description
  - id: AC-4
    text: "Booking data persists after Save: reload page and verify all fields (guest name, dates, notes, room) match before-save values."
    source: description
  - id: AC-5
    text: "Calendar view displays booking bars correctly positioned by date, sorted by room ascending, color-coded by status."
    source: description
  - id: AC-6
    text: "Customer notes append with descending timestamp order (newest top) and show (user_id) as author name."
    source: description
  - id: AC-7
    text: "Folio and Invoice render with correct line items, tax breakdown (PST Room/Non-Room, GST, MRDT), and totals matching subtotal math."
    source: description
  - id: AC-8
    text: "Bucket isolation enforced: user cannot view/edit bookings from other hotel buckets."
    source: description
  - id: AC-9
    text: "Booking notes validation rejects punctuation (commas, periods, slashes) per spec SD4.1.2; graceful error on 300+ char notes."
    source: description
  - id: AC-10
    text: "Search bookings by date range returns correct overlap results: insiders, outsiders, left-siders, right-siders."
    source: description

