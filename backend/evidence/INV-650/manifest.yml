      - Capture screenshot of filtered view with active indicator
    notes: "file:src/pages/calendar.tsx"
    annotations_hint: "Highlight filter bar and active filter badge"

  - id: TC-0650-002
    title: "Verify filter consistency on Bookings Search"
    type: manual
    priority: P0
