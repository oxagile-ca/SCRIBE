    ac: []
    evidence_required: [manual-note]
    tags: ["@universal", "@INV-608"]
    notes: "Check all <img> and asset URLs return 200. Folio/Invoice are print-oriented pages."

  - id: TC-UV-4
    title: "Document lifecycle smoke (booking-dependent; verify folio/invoice read round-trip)"
    type: automated
    priority: P1
    ac: []
    evidence_required: [screenshot]
    tags: ["@universal", "@INV-608"]
    notes: "Folio/Invoice are read-only renders; D1-D5 gates exempt (no save action). Log exemption."

  - id: TC-UV-5
    title: "Accessibility scan on Folio and Invoice pages"
    type: automated
    priority: P2
    ac: []
    evidence_required: [manual-note]
    tags: ["@universal", "@INV-608"]
    notes: "Run axe-core or DOM-level a11y check on /folio and /invoice routes"

  - id: TC-UV-6
    title: "Snapshot drift check (no baseline exists for INV-608 — first run)"
