      - Verify active filter count displays
      - Clear one filter
      - Verify count decrements
      - Capture screenshot showing filter UI and count
    notes: "file:src/pages/search.tsx | Ensure count display AC-3"
    annotations_hint: "Point to filter pill chips and count badge"

