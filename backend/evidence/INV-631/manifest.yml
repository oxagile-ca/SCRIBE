      - "Setup test bookings: May 10-22, May 22-30, May 15-27"
      - "Re-search May 20-25"
      - "Verify: outsiders (booking starts before AND ends after) = May 15-27"
      - "Verify: left-siders (booking starts before AND ends inside) = May 10-22"
      - "Verify: right-siders (booking starts inside AND ends after) = May 22-30"
    tags: ["@INV-631", "@search", "@overlap", "@booking-logic"]
    notes: "4-case overlap matrix per domain spec; file:src/utils/bookingOverlap.ts:10-60"
    annotations_hint: "Table showing each overlap case and matching bookings"

