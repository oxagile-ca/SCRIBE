acceptance_criteria:
  - id: AC-1
    text: "Folio Table only itemizes Charges — Payment and Deposit rows do NOT appear inline in the charge table"
    source: description
  - id: AC-2
    text: "Folio shows a Payment and Deposit summary at the bottom (not inline)"
    source: description
  - id: AC-3
    text: "PAYMENT type is correctly displayed in Invoice/deposit section"
    source: description
  - id: AC-4
    text: "SOLI status of Cancelled is supported — cancelled line items handled correctly in Folio and Invoice"
    source: description
  - id: AC-5
    text: "Item and description fields are populated with correct values in Folio and Invoice line items"
    source: description
  - id: AC-6
    text: "Folio, Invoice Summary & Invoice only display/compute values related to the associated booking (no cross-booking bleed)"
    source: description
  - id: AC-7
    text: "Folio math: Subtotal + taxes = Total; Total - Deposits/Payments = Balance Due"
    source: derived
  - id: AC-8
    text: "Invoice renders with payment history visible alongside deposit history"
    source: description

test_cases:
  - id: TC-0608-001
    title: "Folio charge table renders charges only (no inline payment/deposit rows)"
    type: automated
    priority: P0
    ac: [AC-1, AC-5]
    evidence_required: [screenshot, markup]
    steps:
      - Navigate to Reservation Details for BK_J755DICT
      - Click Print Folio button
      - Verify the Folio renders in /reservation/BK_J755DICT/folio
      - Inspect charge table — assert only room charge rows present (no PAYMENT or DEPOSIT rows inline)
      - Verify item and description fields are populated
    tags: ["@INV-608", "@folio", "@P0"]
    notes: "Folio Table must only itemize Charges per ticket description. scope: /reservation/:booking_number/folio"
    annotations_hint: "Arrow pointing at the charge table body rows, callout on first line item showing item+description fields"

  - id: TC-0608-002
    title: "Folio payment and deposit summary displayed at bottom"
    type: automated
    priority: P0
    ac: [AC-2, AC-8]
    evidence_required: [screenshot, markup]
    steps:
      - On the Folio render page (/reservation/BK_J755DICT/folio)
      - Scroll to bottom section
      - Assert Payment summary row/section is present
      - Assert Deposit summary row/section is present
      - Verify values are shown (non-zero or zero with correct display)
    tags: ["@INV-608", "@folio", "@P0"]
    notes: "Payments and Deposits are summary values at the bottom of the Folio, not inline charge rows"
    annotations_hint: "Callout box around bottom summary section showing Payments and Deposits rows"

  - id: TC-0608-003
    title: "Folio math: Subtotal + taxes = Total; Total minus payments/deposits = Balance Due"
    type: automated
    priority: P0
    ac: [AC-7]
    evidence_required: [screenshot, markup, manual-note]
    steps:
      - On the Folio render page
      - Capture Subtotal, each tax line (PST Room 8%, PST Non-Room 7%, GST 5%, MRDT 3%), Total, Deposits, Payments, Balance Due
      - Assert Subtotal + taxes = Total (math check)
      - Assert Total - Deposits - Payments = Balance Due
      - Verify currency is CAD and formatted to 2 decimal places
    tags: ["@INV-608", "@folio", "@math", "@P0"]
    notes: "Math must reconcile. API endpoint: GET /so/folio?booking_id=8 for cross-check"
    annotations_hint: "Table with arrows pointing to each math row: Subtotal, taxes, Total, Deposits, Payments, Balance Due"

  - id: TC-0608-004
    title: "Invoice renders with PAYMENT type correctly displayed"
    type: automated
    priority: P0
    ac: [AC-3, AC-8]
    evidence_required: [screenshot, markup]
    steps:
      - Navigate to /reservation/BK_J755DICT/invoice
      - Verify Invoice renders (not blank)
      - Locate payment history section
      - Assert PAYMENT type label is visible and correct
      - Verify payment amount and date shown
    tags: ["@INV-608", "@invoice", "@payment", "@P0"]
    notes: "PAYMENT type display is core to DB1.7 changes. API: GET /so/invoice?booking_id=8"
    annotations_hint: "Arrow pointing at PAYMENT type row in invoice, callout on payment amount"

  - id: TC-0608-005
    title: "Invoice balance math reconciles (running balance and total)"
    type: automated
    priority: P1
    ac: [AC-7]
    evidence_required: [screenshot, markup, manual-note]
    steps:
      - On Invoice render page
      - Capture line items with running balance
      - Assert final balance reconciles to Total - all deposits - all payments
      - Verify Invoice Number is present
      - Verify currency CAD, 2 decimals throughout
    tags: ["@INV-608", "@invoice", "@math", "@P1"]
    notes: "Known prior issue: Invoice showed INV-608.00 as a value — verify this is fixed. API: GET /so/invoice?booking_id=8"
    annotations_hint: "Callout on Invoice Number, arrow to Balance column showing running reconciliation"

  - id: TC-0608-006
    title: "SOLI Cancelled status handled in Folio and Invoice"
    type: automated
    priority: P1
    ac: [AC-4]
    evidence_required: [screenshot, markup]
    steps:
      - On Folio and Invoice render pages for BK_J755DICT
      - Verify cancelled line items are either excluded or marked Cancelled — not shown as active charges
      - Verify total excludes cancelled amounts
      - Assert no rendering crash or blank rows for cancelled SOLIs
    tags: ["@INV-608", "@soli", "@cancelled", "@P1"]
    notes: "DB1.7 added Cancelled SOLI type. Validate FE handles it in both Folio and Invoice"
    annotations_hint: "If cancelled items present: callout on the cancelled row showing its display treatment"

  - id: TC-0608-007
    title: "Item and description fields populated correctly in Folio line items"
    type: automated
    priority: P1
    ac: [AC-5]
    evidence_required: [screenshot, markup]
    steps:
      - On Folio render page
      - For each charge row, verify 'item' column is not blank/null
      - Verify 'description' column is not blank/null
      - Check values match the booking's room charges (room name / rate description)
    tags: ["@INV-608", "@folio", "@fields", "@P1"]
    notes: "Ticket explicitly says: validate item and description fields are populated"
    annotations_hint: "Arrow to item column and description column in first charge row"

  # Universal Validation Suite
